services:
  php: 
    build: ./php
    volumes:
      - ./src/my-app:/var/www

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./src/my-app:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: laravel

volumes:
  mysql-data:
